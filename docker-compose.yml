services:
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: user_directory_php
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      APP_ENV: dev
      DATABASE_URL: "mysql://symfony:symfony@mariadb:3306/symfony?serverVersion=mariadb-11.4.0&charset=utf8mb4"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - user_directory

  nginx:
    image: nginx:stable-alpine
    container_name: user_directory_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - user_directory

  mariadb:
    image: mariadb:lts
    container_name: user_directory_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: symfony
      MARIADB_USER: symfony
      MARIADB_PASSWORD: symfony
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - user_directory

volumes:
  mariadb_data:

networks:
  user_directory:
    driver: bridge
